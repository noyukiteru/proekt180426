{% extends "base.html" %}
{% block title %}Расписание{% endblock %}
{% block content %}
<h2 class="mb-4">📅 Управление записями</h2>
<div class="table-responsive">
    <table class="table table-striped table-hover align-middle" id="appointments-table">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Клиент</th>
                <th>Мастер</th>
                <th>Услуга</th>
                <th>Время</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody id="appointments-list">
            <tr><td colspan="6" class="text-center">Загрузка...</td></tr>
        </tbody>
    </table>
</div>

<script>
    async function loadAppointments() {
        try {
            const res = await fetch('/api/appointments/');
            const data = await res.json();
            const tbody = document.getElementById('appointments-list');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">Записей пока нет</td></tr>';
                return;
            }

            data.forEach(app => {
                const statusClass = app.status === 'completed' ? 'success' :
                    app.status === 'cancelled' ? 'danger' : 'warning';
                const row = `
                    <tr>
                        <td>${app.id}</td>
                        <td>${app.user?.name || 'Клиент #' + app.user_id}</td>
                        <td>${app.master?.name || 'Мастер #' + app.master_id}</td>
                        <td>${app.service?.title || 'Услуга #' + app.service_id}</td>
                        <td>${app.date_time}</td>
                        <td><span class="badge bg-${statusClass}">${app.status}</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        } catch (error) {
            console.error('Ошибка загрузки:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', loadAppointments);
</script>
{% endblock %}
